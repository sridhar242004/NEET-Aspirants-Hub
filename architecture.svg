<svg viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Architecture and data flow diagram">
  <defs>
    <linearGradient id="archbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#04080F"/>
    </linearGradient>
  </defs>
  <style>
    .flow { stroke-dasharray: 6 8; animation: flow 1.6s linear infinite; }
    @keyframes flow { to { stroke-dashoffset: -56; } }
    .pulseRing { animation: ring 2.4s ease-in-out infinite; }
    @keyframes ring { 0%,100% { opacity: .25; } 50% { opacity: .75; } }
    .warnPulse { animation: warn 1.8s ease-in-out infinite; }
    @keyframes warn { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .flow, .pulseRing, .warnPulse { animation: none !important; }
    }
    text { font-family: 'DM Sans', Helvetica, Arial, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    .box { fill: #0C1628; stroke: #FFFFFF; stroke-opacity: 0.12; rx: 12; }
    .title { fill: #F1F5FF; font-weight: 700; font-size: 14px; }
    .sub { fill: #94A3B8; font-size: 11.5px; }
  </style>

  <rect width="1200" height="460" fill="url(#archbg)"/>
  <rect x="0.5" y="0.5" width="1199" height="459" rx="14" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <!-- Browser / DOM -->
  <rect class="box" x="60" y="40" width="300" height="80"/>
  <text class="title" x="84" y="72">Browser &#8226; index.html</text>
  <text class="sub" x="84" y="92">Single static document, no build step</text>

  <!-- Three.js -->
  <rect class="box" x="60" y="170" width="300" height="90" stroke="#2563EB" stroke-opacity="0.4"/>
  <text class="title" x="84" y="200">Render Layer &#8226; Three.js r128</text>
  <text class="sub" x="84" y="220">DNA helix &#8226; particle field &#8226; atom models</text>
  <text class="sub" x="84" y="237">Mouse-parallax camera, requestAnimationFrame loop</text>

  <!-- GSAP -->
  <rect class="box" x="60" y="310" width="300" height="90" stroke="#10B981" stroke-opacity="0.4"/>
  <text class="title" x="84" y="340">Motion Layer &#8226; GSAP + ScrollTrigger</text>
  <text class="sub" x="84" y="360">.reveal fade-ins &#8226; IntersectionObserver counters</text>
  <text class="sub" x="84" y="377">Countdown timer, mock-test state toggles</text>

  <!-- Chat UI -->
  <rect class="box" x="450" y="170" width="300" height="90" stroke="#8B5CF6" stroke-opacity="0.4"/>
  <text class="title" x="474" y="200">Chat Widget &#8226; Dr. NEET</text>
  <text class="sub" x="474" y="220">DOM message list, in-memory chatHistory[]</text>
  <text class="sub" x="474" y="237">fetch() on send, typing-indicator state</text>

  <!-- Anthropic API box, flagged -->
  <rect class="box" x="840" y="170" width="300" height="100" stroke="#F59E0B" stroke-opacity="0.55"/>
  <text class="title" x="864" y="198">api.anthropic.com/v1/messages</text>
  <text class="sub" x="864" y="218">Direct client-side fetch, no API key present</text>
  <circle class="warnPulse" cx="864" cy="240" r="4" fill="#F59E0B"/>
  <text class="sub" x="878" y="244" fill="#FCD34D">&#9888; works only where a key/proxy is injected</text>
  <text class="sub" x="864" y="260" fill="#FCD34D">&#8211; see "Known Limitations" in README</text>

  <!-- arrows -->
  <g stroke="#60A5FA" stroke-width="2" fill="none">
    <path class="flow" d="M210 120 L210 170"/>
    <path class="flow" d="M210 260 L210 310"/>
    <path class="flow" d="M360 210 L450 210"/>
    <path class="flow" d="M750 210 L840 215"/>
  </g>

  <!-- legend -->
  <circle class="pulseRing" cx="86" cy="430" r="5" fill="#60A5FA"/>
  <text class="sub" x="100" y="434">Runtime data flow</text>
  <circle cx="290" cy="430" r="5" fill="none" stroke="#F59E0B" stroke-opacity="0.7" stroke-width="2"/>
  <text class="sub" x="304" y="434">Honest limitation, not yet production-hardened</text>
</svg>
