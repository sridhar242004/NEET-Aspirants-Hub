<svg viewBox="0 0 1200 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Design token color system">
  <defs>
    <linearGradient id="dtbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0C1628"/>
    </linearGradient>
  </defs>
  <style>
    .swatch { animation: breathe 3.6s ease-in-out infinite; }
    .swatch:nth-of-type(2) { animation-delay: .3s; }
    .swatch:nth-of-type(3) { animation-delay: .6s; }
    .swatch:nth-of-type(4) { animation-delay: .9s; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
    @media (prefers-reduced-motion: reduce) { .swatch { animation: none !important; } }
    text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
  </style>

  <rect width="1200" height="150" rx="12" fill="url(#dtbg)"/>
  <rect x="0.5" y="0.5" width="1199" height="149" rx="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <text x="32" y="34" font-size="11" letter-spacing="2" fill="#475569">--token</text>
  <text x="1168" y="34" font-size="11" letter-spacing="2" fill="#475569" text-anchor="end">hex</text>

  <!-- Primary -->
  <circle class="swatch" cx="56" cy="92" r="20" fill="#2563EB"/>
  <text x="92" y="84" font-size="14" font-weight="700" fill="#F1F5FF">--blue</text>
  <text x="92" y="103" font-size="12" fill="#94A3B8">#2563EB &#8226; Primary / Navigation</text>

  <!-- Physics -->
  <circle class="swatch" cx="356" cy="92" r="20" fill="#F59E0B"/>
  <text x="392" y="84" font-size="14" font-weight="700" fill="#F1F5FF">--phys</text>
  <text x="392" y="103" font-size="12" fill="#94A3B8">#F59E0B &#8226; Physics</text>

  <!-- Chemistry -->
  <circle class="swatch" cx="656" cy="92" r="20" fill="#8B5CF6"/>
  <text x="692" y="84" font-size="14" font-weight="700" fill="#F1F5FF">--chem</text>
  <text x="692" y="103" font-size="12" fill="#94A3B8">#8B5CF6 &#8226; Chemistry</text>

  <!-- Biology -->
  <circle class="swatch" cx="956" cy="92" r="20" fill="#10B981"/>
  <text x="992" y="84" font-size="14" font-weight="700" fill="#F1F5FF">--bio</text>
  <text x="992" y="103" font-size="12" fill="#94A3B8">#10B981 &#8226; Biology</text>
</svg>
