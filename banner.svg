<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NEET Aspirants Hub banner">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0B1E40"/>
      <stop offset="70%" stop-color="#04080F"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="helixA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="helixB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <clipPath id="frame"><rect x="0" y="0" width="1200" height="320" rx="14"/></clipPath>
  </defs>

  <style>
    .twinkle { animation: tw 3.2s ease-in-out infinite; }
    .twinkle:nth-of-type(2n) { animation-delay: .6s; }
    .twinkle:nth-of-type(3n) { animation-delay: 1.1s; }
    .twinkle:nth-of-type(5n) { animation-delay: 1.7s; }
    @keyframes tw { 0%,100% { opacity: .15; } 50% { opacity: .85; } }

    .helixGroup { animation: drift 9s ease-in-out infinite; transform-origin: 1010px 160px; }
    @keyframes drift { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(2.5deg); } }

    .eyebrowDot { animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

    .baseSphere { animation: pop 4s ease-in-out infinite; }
    @keyframes pop { 0%,100% { r: 4; opacity: .8; } 50% { r: 5.5; opacity: 1; } }

    @media (prefers-reduced-motion: reduce) {
      .twinkle, .helixGroup, .eyebrowDot, .baseSphere { animation: none !important; }
    }
  </style>

  <g clip-path="url(#frame)">
    <rect width="1200" height="320" fill="url(#bgGlow)"/>

    <!-- starfield -->
    <g fill="#60A5FA">
      <circle class="twinkle" cx="60" cy="48" r="2"/>
      <circle class="twinkle" cx="140" cy="110" r="1.6" fill="#C4B5FD"/>
      <circle class="twinkle" cx="95" cy="200" r="2" fill="#6EE7B7"/>
      <circle class="twinkle" cx="220" cy="60" r="1.4"/>
      <circle class="twinkle" cx="180" cy="250" r="1.8" fill="#FCD34D"/>
      <circle class="twinkle" cx="300" cy="40" r="1.5" fill="#C4B5FD"/>
      <circle class="twinkle" cx="40" cy="270" r="1.6"/>
      <circle class="twinkle" cx="1140" cy="55" r="2" fill="#6EE7B7"/>
      <circle class="twinkle" cx="1080" cy="220" r="1.6" fill="#FCD34D"/>
      <circle class="twinkle" cx="1160" cy="150" r="1.8" fill="#C4B5FD"/>
      <circle class="twinkle" cx="1020" cy="270" r="1.4"/>
      <circle class="twinkle" cx="960" cy="45" r="1.6"/>
    </g>

    <!-- DNA helix motif, right side -->
    <g class="helixGroup">
      <path d="M 970 40 C 1040 75, 940 110, 1010 145 C 1080 180, 940 215, 1010 250 C 1080 285, 980 300, 1010 305"
            fill="none" stroke="url(#helixA)" stroke-width="3" opacity="0.85"/>
      <path d="M 1050 40 C 980 75, 1080 110, 1010 145 C 940 180, 1080 215, 1010 250 C 940 285, 1040 300, 1010 305"
            fill="none" stroke="url(#helixB)" stroke-width="3" opacity="0.85"/>
      <g stroke="#C4B5FD" stroke-width="1.4" opacity="0.35">
        <line x1="975" y1="55" x2="1045" y2="55"/>
        <line x1="955" y1="92" x2="1065" y2="92"/>
        <line x1="965" y1="128" x2="1055" y2="128"/>
        <line x1="970" y1="165" x2="1050" y2="165"/>
        <line x1="958" y1="200" x2="1062" y2="200"/>
        <line x1="968" y1="237" x2="1052" y2="237"/>
        <line x1="985" y1="272" x2="1035" y2="272"/>
      </g>
      <circle class="baseSphere" cx="975" cy="55" r="4" fill="#60A5FA"/>
      <circle class="baseSphere" cx="1045" cy="55" r="4" fill="#6EE7B7"/>
      <circle class="baseSphere" cx="955" cy="92" r="4" fill="#60A5FA"/>
      <circle class="baseSphere" cx="1065" cy="92" r="4" fill="#6EE7B7"/>
      <circle class="baseSphere" cx="965" cy="128" r="4" fill="#60A5FA"/>
      <circle class="baseSphere" cx="1055" cy="128" r="4" fill="#6EE7B7"/>
      <circle class="baseSphere" cx="970" cy="165" r="4" fill="#60A5FA"/>
      <circle class="baseSphere" cx="1050" cy="165" r="4" fill="#6EE7B7"/>
      <circle class="baseSphere" cx="958" cy="200" r="4" fill="#60A5FA"/>
      <circle class="baseSphere" cx="1062" cy="200" r="4" fill="#6EE7B7"/>
      <circle class="baseSphere" cx="968" cy="237" r="4" fill="#60A5FA"/>
      <circle class="baseSphere" cx="1052" cy="237" r="4" fill="#6EE7B7"/>
    </g>

    <!-- eyebrow pill -->
    <rect x="64" y="86" width="318" height="30" rx="15" fill="#FFFFFF" opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <circle class="eyebrowDot" cx="84" cy="101" r="3.5" fill="#10B981"/>
    <text x="98" y="105" font-family="DM Sans, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="600" letter-spacing="1" fill="#94A3B8">AI-POWERED NEET PREP PLATFORM</text>

    <!-- title -->
    <text x="62" y="180" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="58" fill="#F1F5FF">NEET Aspirants</text>
    <text x="62" y="240" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="58" fill="url(#titleGrad)">Hub</text>

    <!-- subtitle -->
    <text x="64" y="275" font-family="DM Sans, Helvetica, Arial, sans-serif" font-size="15" fill="#94A3B8">Single-file, zero-build front end &#8226; Three.js hero &#8226; GSAP-driven motion &#8226; Claude-powered AI mentor</text>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="319" rx="14" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>
</svg>
